name: ar_translate
description: "AR real-time camera translator with overlays anchored to the original text."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.16.0
  google_mlkit_translation: ^0.14.0
  google_mlkit_language_id: ^0.14.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
